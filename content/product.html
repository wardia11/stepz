<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Fiche produit – STEPZ." />
  <title>Produit – STEPZ</title>
  <script>(function(){var l=localStorage.getItem('stepz_lang')||'fr';document.documentElement.lang=l;document.documentElement.dir=(l==='ar')?'rtl':'ltr';if(localStorage.getItem('stepz_theme')==='dark')document.documentElement.setAttribute('data-theme','dark');})();</script>
  <script src="../javascript/animations.js"></script>
  <link rel="stylesheet" href="../style/main.css" />
  <link rel="stylesheet" href="../style/products.css" />
  <link rel="stylesheet" href="../style/detail.css" />
</head>
<body>

  <header>
    <nav class="navbar" aria-label="Navigation principale">
      <div class="nav-container">
        <a href="../index.html" class="nav-logo" aria-label="STEPZ - Accueil">STEP<span>Z</span></a>

        <button class="hamburger" id="hamburger" aria-label="Menu" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>

        <ul class="nav-links" id="nav-links" role="menubar">
          <li role="none"><a href="../index.html" role="menuitem" data-i18n="nav_home">Accueil</a></li>
          <li role="none"><a href="products.html" role="menuitem" data-i18n="nav_products">Produits</a></li>
          <li role="none" class="cart-li"><a href="order.html" class="nav-cart-link" role="menuitem">
            <svg class="cart-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="9" cy="20" r="1.3"/><circle cx="18" cy="20" r="1.3"/>
              <path d="M1 1h3.2l2.1 12a2 2 0 0 0 2 1.65h8.4a2 2 0 0 0 2-1.6L21.5 6H5.2"/>
            </svg>
            <span id="cart-count">0</span>
            <span class="sr-only" data-i18n="nav_cart">Panier</span>
          </a>
            <div class="mini-cart" id="mini-cart"></div>
          </li>
          <li role="none"><a href="login.html" id="nav-account" role="menuitem">Mon Compte</a></li>
          <li role="none"><button id="nav-logout" data-i18n="nav_logout" style="display:none;">Déconnexion</button></li>
          <li role="none"><button id="theme-toggle" class="icon-btn" type="button" aria-label="Thème">🌙</button></li>
          <li role="none"><button id="lang-toggle" class="lang-toggle" type="button">العربية</button></li>
        </ul>
      </div>
    </nav>
  </header>

  <main>
    <div class="pd-wrap" id="pd-root"></div>
  </main>

  <footer>
    <div class="footer-top">
      <div class="footer-brand">
        <a href="../index.html" class="nav-logo">STEP<span>Z</span></a>
        <p data-i18n="footer_tagline_short">Votre destination chaussures depuis 2026.</p>
      </div>
      <div class="footer-col">
        <h4 data-i18n="footer_nav">Navigation</h4>
        <ul>
          <li><a href="../index.html" data-i18n="nav_home">Accueil</a></li>
          <li><a href="products.html" data-i18n="nav_products">Produits</a></li>
        </ul>
      </div>
      <div class="footer-col">
        <h4 data-i18n="footer_account">Compte</h4>
        <ul>
          <li><a href="login.html" data-i18n="f_login">Connexion</a></li>
          <li><a href="register.html" data-i18n="f_register">Inscription</a></li>
        </ul>
      </div>
    </div>
    <div class="footer-bottom">
      <p data-i18n="copyright">&copy; 2026 STEPZ. Tous droits réservés.</p>
    </div>
  </footer>

  <script src="../javascript/data.js"></script>
  <script src="../javascript/i18n.js"></script>
  <script src="../javascript/nav.js"></script>
  <script src="../javascript/product-detail.js"></script>
  <script>
    const hbg = document.getElementById("hamburger");
    const nl  = document.getElementById("nav-links");
    hbg.addEventListener("click", () => {
      hbg.classList.toggle("open");
      nl.classList.toggle("open");
      hbg.setAttribute("aria-expanded", nl.classList.contains("open"));
    });
  </script>
</body>
</html>
